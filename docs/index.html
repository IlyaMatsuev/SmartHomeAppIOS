<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Home — iOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="iOS client for the MySmartHome hub. Install via SideStore.">
  <meta name="theme-color" content="#4B6EF5">
  <link rel="icon" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #4B6EF5; }

    .markdown-section h2,
    .markdown-section h3 { font-weight: 700; letter-spacing: -0.01em; }

<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'My Home',
      repo: 'IlyaMatsuev/SmartHomeAppIOS',
      loadSidebar: false,
      loadNavbar: false,
      auto2top: true,
      themeColor: '#4B6EF5',
      homepage: 'README.md',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

</html>
